<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060C18"/>
      <stop offset="100%" stop-color="#0B1628"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#1A9FFF"/>
      <stop offset="40%" stop-color="#0066FF"/>
      <stop offset="100%" stop-color="#0033CC"/>
    </linearGradient>
    <linearGradient id="silver" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="40%" stop-color="#E0E0E0"/>
      <stop offset="100%" stop-color="#888888"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Blue F: vertical stem + two horizontal bars -->
  <path d="M80 60 L80 450 L140 450 L140 300 L240 300 L240 260 L140 260 L140 160 L270 160 L270 60 Z" fill="url(#blue)"/>
  <!-- Silver D: classic D shape overlapping the F -->
  <path d="M200 100 C200 48 250 20 310 20 L420 20 L420 450 L180 450 C130 450 100 400 100 340 C100 280 130 210 200 160 Z" fill="url(#silver)"/>
  <!-- Dark cutout to create the interlocking effect -->
  <path d="M220 180 L260 180 L260 150 L220 150 Z" fill="#0B1628"/>
</svg>
